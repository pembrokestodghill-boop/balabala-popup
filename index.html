<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" id="viewport-meta" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#F8D36A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>活在热爱里 - 社区地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            background-color: #F8D36A;
        }

        .view-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #view-intro { z-index: 30; }
        #view-rotate { background-color: #333; color: white; z-index: 40; }
        #view-map { display: none; z-index: 20; background-color: #F8D36A; align-items: flex-start; }

        @keyframes phoneRotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }
        .animate-phone { animation: phoneRotate 2s ease-in-out infinite; }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-6deg); }
            75% { transform: rotate(6deg); }
        }
        .animate-sway { 
            animation: sway 3s ease-in-out infinite; 
            transform-origin: bottom center; 
        }

        @keyframes pan {
            0%, 100% { transform: translateX(0px); }
            50% { transform: translateX(-15px); }
        }
        .animate-pan { animation: pan 4s ease-in-out infinite; }

        @keyframes drive {
            0%, 100% { transform: translateX(0px); }
            50% { transform: translateX(15px); }
        }
        .animate-drive { animation: drive 3.5s ease-in-out infinite; }

        @keyframes scanGlow {
            0% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.8); border-color: rgba(16, 185, 129, 1); }
            100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.3); }
        }
        .animate-scan { animation: scanGlow 2s infinite; }

        .modal-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .scroll-container {
            width: 100%; height: 100%;
            overflow-x: auto; overflow-y: hidden;
            -webkit-overflow-scrolling: touch; 
            position: relative;
            overscroll-behavior: none;
            touch-action: pan-x pan-y;
        }
        
        .map-wrapper {
            height: 100%;
            position: relative;
            display: inline-block; 
        }

        .map-bg-img, .hotspot-ip img {
            pointer-events: none; 
            user-select: none;
            -webkit-user-drag: none;
        }

        .map-bg-img {
            height: 100%; 
            width: auto;  
            max-width: none;
            display: block;
        }

        .hotspot-ip {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            --tx: 0px;
            --ty: 0px;
            --scale: 1;
            transform: translate(var(--tx), var(--ty)) scale(var(--scale));
        }
        .hotspot-ip:active { 
            --scale: 0.95; 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div id="app-root" class="relative w-full h-full overflow-hidden bg-[#F8D36A] origin-center transition-transform duration-300">

        <!-- ================= 视图 1：竖屏开启页 ================= -->
        <div id="view-intro" class="view-layer relative overflow-hidden cursor-pointer">
            <img src="assets/intro-bg.jpg" class="absolute inset-0 w-full h-full object-cover z-0" alt="活动海报">
            <video 
                id="intro-video"
                src="assets/intro-bg.mp4" 
                poster="assets/intro-bg.jpg"
                autoplay 
                muted 
                playsinline 
                webkit-playsinline
                x5-video-player-type="h5"
                x5-video-player-fullscreen="true"
                class="absolute inset-0 w-full h-full object-cover z-10"

        <!-- ================= 视图 2：旋转手机提示页 ================= -->

        <!-- ================= 视图 3：横向地图主页 ================= -->

            <div class="scroll-container" id="map-scroll-container">
                <div class="map-wrapper">
                    
                    <img src="assets/map-horizontal.webp" alt="活动地图" class="map-bg-img" onerror="console.error('找不到地图背景，请检查路径')">

                    <div class="hotspot-ip z-20" style="top: 50%; left: 5%; --tx: -50%; --ty: -50%;" data-zone="departure">

                    <div class="hotspot-ip z-20" style="top: 25%; left: 18%; --tx: -50%; --ty: -50%;" data-zone="climbing">

                    <div class="hotspot-ip z-30" style="top: 63%; left: 60%; --tx: -50%; --ty: -50%;" data-zone="zone_h">
                        <img src="assets/golden.png" alt="金币" class="w-16 h-16 sm:w-24 sm:h-24 object-contain animate-sway drop-shadow-lg" style="animation-delay: 1.2s;" onerror="this.style.display='none';">
                    </div>

                    <div class="hotspot-ip z-20" style="top: 39%; left: 66%; --tx: -50%; --ty: -50%;" data-zone="bubble">
                        <img src="assets/ip-octopus.png" alt="章鱼" class="w-24 h-24 sm:w-36 sm:h-36 object-contain animate-sway drop-shadow-lg" style="animation-delay: 1.8s;">
                    </div>

                    <div class="hotspot-ip z-20" style="top: 43%; left: 72%; --tx: -50%; --ty: -50%;" data-zone="powerblock">
                        <img src="assets/ip-elephant.png" alt="大象" class="w-24 h-24 sm:w-32 sm:h-32 object-contain animate-sway drop-shadow-lg" style="animation-delay: 1.2s;">
                    </div>

                    <div class="hotspot-ip z-30" style="top: 80%; left: 77%; --tx: -50%; --ty: -50%;" data-zone="zone_e2">
                        <img src="assets/ip-bus.png" alt="巴士" class="w-60 sm:w-[350px] object-contain animate-pan drop-shadow-xl" style="animation-delay: 0.5s;">
                    </div>

                    <div class="hotspot-ip z-10" style="top: 35%; left: 87%; --tx: -50%; --ty: -50%;" data-zone="zone_k">
                        <img src="assets/ip-bear.png" alt="小熊" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway drop-shadow-lg" style="animation-delay: 1.8s;">
                    </div>

                </div>
            </div>

            <!-- ================= 左下角固定时间 ================= -->
            <div id="fixed-time-display" class="absolute left-2 bottom-3 sm:left-4 sm:bottom-4 z-40 flex flex-col transition-opacity duration-300 drop-shadow-md pointer-events-none" style="display: none;">
                <div class="text-orange-600 font-black text-[11px] sm:text-xs tracking-wider flex items-center mb-0.5">
                    <span class="mr-1 text-sm sm:text-base opacity-90">🕒</span> 
                    2026.04.25 <span class="mx-1 font-normal text-orange-500/80">—</span> 05.17
                </div>
                <div class="text-orange-600 font-black text-[7px] sm:text-[9px] tracking-widest ml-5 flex items-center">
                    工作日: 10:00-20:00 <span class="mx-0.5 opacity-50 font-normal">|</span> 周末/节假日: 10:00-21:00
                </div>
            </div>

            <!-- ================= 右下角悬浮菜单 ================= -->
            <div id="floating-menu" class="absolute right-3 bottom-4 sm:right-6 sm:bottom-6 z-40 flex flex-row items-end gap-2 sm:gap-3 transition-opacity duration-300" style="display: none;">
                <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="benefit">
                    <img src="assets/small icon 1.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="打卡福利">
                </button>
                <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="coin">
                    <img src="assets/small icon 2.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="金币玩法">
                </button>
                <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="shop">
                    <img src="assets/small icon 3.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="限时痛店">
                </button>
                <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="calendar">
                    <img src="assets/small icon 4.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="活动课表">
                </button>
                <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="register">
                    <img src="assets/small icon 5.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="活动报名">
                </button>
            </div>
        </div>

        <!-- ================= 🌟 新手引导全屏遮罩 ================= -->
        <div id="tutorial-mask" class="absolute inset-0 z-[70] hidden bg-black/85 fade-in pointer-events-auto"></div>

        <!-- ================= 左上角：入场指引指南针 ================= -->
        <button id="btn-reopen-guide" class="absolute top-4 left-4 sm:top-6 sm:left-6 z-40 hidden active:scale-90 transition-transform duration-200 w-14 h-14 sm:w-16 sm:h-16 shrink-0 cursor-pointer origin-center">
            <img src="assets/guide-icon.png" class="w-full h-full object-contain drop-shadow-md relative z-10" alt="入场指引" onerror="this.style.display='none';">
            <div id="tutorial-ring" class="absolute inset-[-10px] rounded-full border-2 border-white border-dashed animate-pulse hidden pointer-events-none z-0"></div>
        </button>

        <!-- ================= 🌟 悬浮画廊：活动指引长图 ================= -->
        <div id="guide-modal" class="absolute inset-0 z-[60] hidden flex items-center justify-center p-4 sm:p-8">
            <div class="absolute inset-0 bg-black/70 backdrop-blur-sm cursor-pointer" id="guide-overlay"></div>
            <div id="guide-scroll-container" class="relative z-10 w-full max-w-4xl h-auto max-h-[85vh] overflow-x-auto overflow-y-auto custom-scrollbar rounded-2xl shadow-2xl pointer-events-auto bg-[#FDF2E2] border border-white/20 fade-in flex items-center p-2 sm:p-4" style="-webkit-overflow-scrolling: touch; touch-action: pan-x pan-y;">
                <img src="assets/guide-bg.webp" class="h-[50vh] sm:h-[65vh] w-auto max-w-none block rounded-xl shadow-sm" alt="活动引导" onerror="console.error('找不到活动引导图片')">
            </div>
        </div>

        <!-- ================= 通用弹窗组件 ================= -->
        <div id="info-modal" class="absolute inset-0 z-50 hidden flex items-center justify-center p-4 pointer-events-none">
            <!-- 遮罩恢复点击拦截 -->
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity cursor-pointer pointer-events-auto" id="modal-overlay"></div>
            
            <!-- 移除强制宽高死限，纯粹包裹，依靠内部的内容来撑起高度 -->
            <div id="modal-card" class="w-full max-w-lg rounded-[32px] overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.15)] z-10 relative transition-all duration-300 modal-enter pointer-events-auto" style="background-color: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">
                <div id="modal-glow" class="absolute top-0 right-0 w-full h-48 opacity-40 pointer-events-none transition-colors duration-500" style="background: radial-gradient(circle at 80% 0%, var(--theme-color), transparent 70%);"></div>
                <!-- 内部动态内容容器 -->
                <div id="modal-dynamic-content" class="w-full relative z-10"></div>
            </div>
        </div>

    </div>

    <script>
        const viewIntro = document.getElementById('view-intro');
        const viewRotate = document.getElementById('view-rotate');
        const viewMap = document.getElementById('view-map');
        const floatingMenu = document.getElementById('floating-menu');
        const fixedTimeDisplay = document.getElementById('fixed-time-display');
        const btnReopenGuide = document.getElementById('btn-reopen-guide');
        
        let hasStarted = false;
        let hasSeenGuide = false;
        let isForcedLandscape = false; 

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) {
            const forceBtn = document.getElementById('btn-force-landscape');
            if (forceBtn) forceBtn.style.display = 'none';
        }

        function checkOrientation() {
            if (!hasStarted) return; 
            
            const physicalLandscape = window.innerWidth > window.innerHeight;
            
            if (physicalLandscape && isForcedLandscape) {
                isForcedLandscape = false;
                const appRoot = document.getElementById('app-root');
                appRoot.style.position = '';
                appRoot.style.top = '';
                appRoot.style.left = '';
                appRoot.style.width = '100%';
                appRoot.style.height = '100%';
                appRoot.style.transform = '';
            }
            
            const isLandscape = physicalLandscape || isForcedLandscape;
            
            if (isLandscape) {
                viewIntro.style.display = 'none';
                viewRotate.style.display = 'none';
                viewMap.style.display = 'flex';
                floatingMenu.style.display = 'flex'; 
                fixedTimeDisplay.style.display = 'flex';
                btnReopenGuide.style.display = 'block';
                
                if (!hasSeenGuide) {
                    document.getElementById('tutorial-mask').classList.remove('hidden');
                    btnReopenGuide.classList.replace('z-40', 'z-[80]');
                    document.getElementById('tutorial-ring').classList.remove('hidden');
                }
            } else {
                viewIntro.style.display = 'none';
                viewMap.style.display = 'none';
                viewRotate.style.display = 'flex';
                floatingMenu.style.display = 'none'; 
                fixedTimeDisplay.style.display = 'none'; 
                btnReopenGuide.style.display = 'none';
                document.getElementById('guide-modal').classList.add('hidden');
                document.getElementById('tutorial-mask').classList.add('hidden');
            }
        }

        document.getElementById('btn-force-landscape').addEventListener('click', () => {
            isForcedLandscape = true;
            const appRoot = document.getElementById('app-root');
            const w = window.innerWidth;
            const h = window.innerHeight;
            appRoot.style.position = 'absolute';
            appRoot.style.top = '50%';
            appRoot.style.left = '50%';
            appRoot.style.width = Math.max(w, h) + 'px';
            appRoot.style.height = Math.min(w, h) + 'px';
            appRoot.style.transform = 'translate(-50%, -50%) rotate(90deg)';
            checkOrientation();
        });

        btnReopenGuide.addEventListener('click', (e) => {
            if (!hasSeenGuide) {
                document.getElementById('tutorial-mask').classList.add('hidden');
                btnReopenGuide.classList.replace('z-[80]', 'z-40');
                document.getElementById('tutorial-ring').classList.add('hidden');
                hasSeenGuide = true;
            }
            document.getElementById('guide-modal').classList.remove('hidden');
        });

        document.getElementById('guide-overlay').addEventListener('click', () => {
            document.getElementById('guide-modal').classList.add('hidden');
        });

        const safePlayVideo = (vid) => {
            if (!vid) return;
            const playPromise = vid.play();
            if (playPromise !== undefined && typeof playPromise.catch === 'function') {
                playPromise.catch((e) => { console.log('Autoplay blocked:', e); });
            }
        };

        viewIntro.addEventListener('click', () => {
            hasStarted = true;
            checkOrientation(); 
        });

        document.addEventListener('touchstart', function() {
            const video = document.getElementById('intro-video');
            if (video && video.paused && !hasStarted) {
                safePlayVideo(video);
            }
        }, { once: true });

        const introVideo = document.getElementById('intro-video');
        if (introVideo) {
            introVideo.addEventListener('ended', () => {
                hasStarted = true;
                checkOrientation();
            });
            document.addEventListener("WeixinJSBridgeReady", function() {
                safePlayVideo(introVideo);
            }, false);
        }

        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', () => { setTimeout(checkOrientation, 200); });
        viewIntro.style.display = 'flex';

        const viewportMeta = document.getElementById('viewport-meta');
        function toggleViewportZoom(allow) {
            if(allow) {
                viewportMeta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover');
            } else {
                viewportMeta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
            }
        }

        // ==========================================
        // 🌟 热区数据与 HTML 文案配置区（100%匹配Word版本）
        // ==========================================
        
        const climbingRulesHtml = `
            <div class="bg-orange-100/80 p-3 rounded-xl text-orange-900 border border-orange-200/60"><strong>【重要提示】</strong><br>为确保活动安全有序进行，保障每一位参与者的人身安全与良好体验，请您在入场前仔细阅读本须知。入场即视为您已充分理解并自愿接受以下全部条款。</div>
            <div>
                <h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">1. 开放时间</h4>
                <p class="text-gray-600">周六周日及节假日：10:00 - 19:00</p>
            </div>
            <div>
                <h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">2. 参与流程</h4>
                <ul class="list-disc pl-4 space-y-1 text-gray-700">
                    <li>现场报名：有意参与的用户请在现场工作人员处登记报名，按报名顺序依次体验。</li>
                    <li>教学安排：品牌方邀请专业攀岩教练在场提供基础教学与帮助，每次教学时长不超过15分钟。</li>
                    <li>体验时长：每人每次体验（含教学）不超过15分钟，结束后如需再次参与，请重新报名排队。</li>
                </ul>
            </div>
            <div>
                <h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">3. 入场条件与限制声明</h4>
                <p class="font-bold text-red-600 mb-2">参与者须确认自身健康状况适宜攀岩运动，隐瞒病史执意参与者，一切后果自负。</p>
                <ol class="list-decimal pl-4 space-y-1 text-gray-700">
                    <li>仅限身高1.2米(含)以上的游客进入，每位儿童须由至少一名成人全程陪同。</li>
                    <li>强制签署协议：入场前须现场签署《攀岩墙免责协议》，未签署者一律不得进入。未成年人须由监护人代为签署。</li>

                        </div>
                        <div class="flex-1 min-h-0 w-full overflow-y-auto custom-scrollbar p-6 sm:p-8 flex flex-col items-center justify-center bg-orange-50/50 text-center" style="-webkit-overflow-scrolling: touch; touch-action: pan-y;">
                            <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-orange-100 w-full my-auto">
                                <div class="text-orange-600/80 font-bold mb-3 flex items-center justify-center text-xs sm:text-sm bg-orange-50 w-max mx-auto px-3 py-1 rounded-full border border-orange-100">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    ${eventData.location}
                                </div>
                                <h4 class="text-xl sm:text-2xl font-black text-orange-600 mb-2">${eventData.title}</h4>
                                ${subHtml}
                                ${timesHtml}
                            </div>
                        </div>
                    </div>
                `;
            }
        };

        // ==========================================
        // 主地图 IP 热区弹窗及电子签署核心逻辑
        // ==========================================

        function renderPureIntroModal(data) {
            document.getElementById('modal-glow').style.display = 'none'; 
            modalCard.style.backgroundColor = data.themeColor;
            modalCard.classList.remove('border', 'border-white/60');
            
            modalDynamicContent.innerHTML = `
                <div class="flex flex-col items-center justify-center w-full min-h-[40vh] fade-in p-6">
                    <div class="flex items-center mb-6 drop-shadow-sm">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center font-black text-lg sm:text-xl mr-3 shadow-inner" style="background-color: ${data.textColor}; color: ${data.themeColor};">
                            ${data.badge}
                        </div>
                        <h2 class="text-3xl sm:text-4xl font-black tracking-widest" style="color: ${data.textColor};">${data.title}</h2>
                    </div>
                    <div class="text-center font-bold text-lg sm:text-xl leading-relaxed mb-4" style="color: ${data.textColor};">
                        <p>${data.line1}</p>
                        <p>${data.line2}</p>
                    </div>
                    <div class="text-center font-bold text-[10px] sm:text-xs leading-relaxed opacity-80" style="color: ${data.textColor};">
                        <p>${data.en1}</p>
                        <p>${data.en2}</p>
                    </div>
                </div>
            `;
        }

        function renderFlowStep1(data) {
            document.getElementById('modal-glow').style.display = 'none'; 
            modalCard.style.backgroundColor = data.themeColor;
            modalCard.classList.remove('border', 'border-white/60');

            modalDynamicContent.innerHTML = `
                <div class="flex flex-col w-full h-[85dvh] fade-in relative">
                    <div class="flex-1 min-h-0 w-full overflow-y-auto custom-scrollbar p-6 flex flex-col items-center justify-center" style="-webkit-overflow-scrolling: touch; touch-action: pan-y;">
                        <div class="flex items-center mb-6 drop-shadow-sm shrink-0 mt-auto">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center font-black text-lg sm:text-xl mr-3 shadow-inner" style="background-color: ${data.textColor}; color: ${data.themeColor};">
                                ${data.badge}
                            </div>
                            <h2 class="text-3xl sm:text-4xl font-black tracking-widest" style="color: ${data.textColor};">${data.title}</h2>
                        </div>
                        <div class="text-center font-bold text-lg sm:text-xl leading-relaxed mb-4 shrink-0" style="color: ${data.textColor};">
                            <p>${data.line1}</p>
                            <p>${data.line2}</p>
                        </div>
                        <div class="text-center font-bold text-[10px] sm:text-xs leading-relaxed opacity-80 mb-10 shrink-0" style="color: ${data.textColor};">
                            <p>${data.en1}</p>
                            <p>${data.en2}</p>
                        </div>
                        <button id="btn-read-safety" class="w-full max-w-[280px] shrink-0 font-bold py-3.5 px-6 rounded-2xl shadow-lg transform transition active:scale-95 text-sm sm:text-base mb-auto" style="background-color: ${data.textColor}; color: ${data.themeColor};">
                            阅读入场安全须知
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('btn-read-safety').addEventListener('click', () => {
                document.getElementById('modal-glow').style.display = 'block';
                modalCard.style.backgroundColor = 'rgba(255, 255, 255, 0.65)';
                modalCard.classList.add('border', 'border-white/60');
                renderFlowStep2(data.rulesTitle, data.rulesHtml, null, data.agreementTitle, data.agreementHtml);
            });
        }

        function renderMultiFlowStep1(data) {
            document.getElementById('modal-glow').style.display = 'none'; 
            modalCard.style.backgroundColor = data.themeColor;
            modalCard.classList.remove('border', 'border-white/60');

            const buttonsHtml = data.options.map((opt, index) => `
                <button onclick="window.triggerMultiOption('${data.id}', ${index})" class="w-full shrink-0 font-bold py-3.5 px-6 rounded-2xl shadow-lg transform transition active:scale-95 text-sm sm:text-base mb-3.5" style="background-color: ${data.textColor}; color: ${data.themeColor};">
                    ${opt.btnText}
                </button>
            `).join('');

            modalDynamicContent.innerHTML = `
                <div class="flex flex-col w-full h-[85dvh] fade-in relative">
                    <div class="flex-1 min-h-0 w-full overflow-y-auto custom-scrollbar p-6 flex flex-col items-center justify-center" style="-webkit-overflow-scrolling: touch; touch-action: pan-y;">
                        <div class="flex items-center mb-6 drop-shadow-sm shrink-0 mt-auto">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center font-black text-lg sm:text-xl mr-3 shadow-inner" style="background-color: ${data.textColor}; color: ${data.themeColor};">
                                ${data.badge}
                            </div>
                            <h2 class="text-3xl sm:text-4xl font-black tracking-widest" style="color: ${data.textColor};">${data.title}</h2>
                        </div>
                        <div class="text-center font-bold text-lg sm:text-xl leading-relaxed mb-4 shrink-0" style="color: ${data.textColor};">
                            <p>${data.line1}</p>
                            <p>${data.line2}</p>
                        </div>
                        <div class="text-center font-bold text-[10px] sm:text-xs leading-relaxed opacity-80 mb-8 shrink-0" style="color: ${data.textColor};">
                            <p>${data.en1}</p>
                            <p>${data.en2}</p>
                        </div>
                        <div class="w-full max-w-[280px] shrink-0 mb-auto">
                            ${buttonsHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        window.triggerMultiOption = (zoneId, optionIndex) => {
            const opt = zonesData[zoneId].options[optionIndex];
            document.getElementById('modal-glow').style.display = 'block';
            modalCard.style.backgroundColor = 'rgba(255, 255, 255, 0.65)';
            modalCard.classList.add('border', 'border-white/60');
            renderFlowStep2(opt.rulesTitle, opt.rulesHtml, null, opt.agreementTitle, opt.agreementHtml);
        };

        window.renderFlowStep2 = function(rulesTitle, rulesHtml, backAction = null, agreementTitle = null, agreementHtml = null) {
            const backBtnHtml = backAction ? `
                <button onclick="${backAction}" class="absolute left-4 text-orange-600 font-bold text-sm flex items-center active:scale-95 transition">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>返回
                </button>
            ` : '';

            const btnText = agreementHtml ? '已阅须知，下一步：签署安全协议' : '我已阅读并接受此须知，为自己安全负责';

            modalDynamicContent.innerHTML = `
                <div class="w-full flex flex-col h-[85dvh] fade-in relative">
                    <div class="shrink-0 h-[60px] flex justify-center items-center border-b border-white/40 z-20">
                        ${backBtnHtml}
                        <h3 class="text-lg sm:text-xl font-black text-orange-800 px-10 truncate w-full text-center">${rulesTitle}</h3>
                    </div>
                    <div class="flex-1 min-h-0 w-full overflow-y-auto custom-scrollbar p-5 sm:p-6 text-xs sm:text-sm text-gray-800 leading-relaxed space-y-5" style="-webkit-overflow-scrolling: touch; touch-action: pan-y;">
                        ${rulesHtml}
                    </div>
                    <div class="shrink-0 h-[72px] bg-white/80 backdrop-blur-md border-t border-gray-100 flex items-center justify-center px-4 z-20">
                        <button id="btn-accept-rules" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_8px_20px_rgba(234,88,12,0.3)] transform transition active:scale-95 text-sm sm:text-base flex justify-center items-center">
                            ${btnText}
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('btn-accept-rules').addEventListener('click', () => {
                if (agreementHtml) {
                    renderAgreementStep(agreementTitle, agreementHtml, rulesTitle, rulesHtml, backAction);
                } else {
                    renderPassStep3();
                }
            });
        }

        window.renderAgreementStep = function(title, html, rulesTitle, rulesHtml, originalBackAction) {
            window.goBackToRules = function() {
                renderFlowStep2(rulesTitle, rulesHtml, originalBackAction, title, html);
            };

            modalDynamicContent.innerHTML = `
                <div class="w-full flex flex-col h-[85dvh] fade-in relative">
                    <div class="shrink-0 h-[60px] flex justify-center items-center border-b border-white/40 z-20">
                        <button onclick="window.goBackToRules()" class="absolute left-4 text-orange-600 font-bold text-sm flex items-center active:scale-95 transition">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>返回
                        </button>
                        <h3 class="text-lg sm:text-xl font-black text-orange-800 px-10 truncate w-full text-center">${title}</h3>
                    </div>
                    <div class="flex-1 min-h-0 w-full overflow-y-auto custom-scrollbar p-5 sm:p-6 bg-white/60" style="-webkit-overflow-scrolling: touch; touch-action: pan-y;">
                        ${html}
                    </div>
                    <div class="shrink-0 bg-white/90 backdrop-blur-md border-t border-gray-200 flex flex-col items-center justify-center px-4 py-4 z-20">
                        <div class="w-full bg-orange-50/50 p-3 rounded-xl border border-orange-100 mb-3 shadow-inner">
                            <input type="text" id="signer-name" placeholder="请填写本人（或监护人）真实姓名完成签署：" class="w-full bg-white border border-orange-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors">
                        </div>
                        <button id="btn-sign-agreement" disabled class="w-full bg-gray-400 text-white font-bold py-3.5 px-4 rounded-xl transition text-sm sm:text-base flex justify-center items-center cursor-not-allowed">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            同意并电子签署协议
                        </button>
                    </div>
                </div>
            `;

            const nameInput = document.getElementById('signer-name');
            const signBtn = document.getElementById('btn-sign-agreement');

            nameInput.addEventListener('input', (e) => {
                if (e.target.value.trim().length > 0) {
                    signBtn.disabled = false;
                    signBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                    signBtn.classList.add('bg-green-600', 'hover:bg-green-700', 'shadow-[0_8px_20px_rgba(16,185,129,0.3)]', 'active:scale-95');
                } else {
                    signBtn.disabled = true;
                    signBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                    signBtn.classList.remove('bg-green-600', 'hover:bg-green-700', 'shadow-[0_8px_20px_rgba(16,185,129,0.3)]', 'active:scale-95');
                }
            });

            signBtn.addEventListener('click', () => {
                const name = nameInput.value.trim();
                if(name) {
                    renderPassStep3(name);
                }
            });
        }

        window.renderPassStep3 = function(signerName = '') {
            document.getElementById('modal-glow').style.setProperty('--theme-color', '#10B981');
            const now = new Date();
            const timeString = `${now.getMonth()+1}月${now.getDate()}日 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            let signerHtml = '';
            if (signerName) {
                signerHtml = `
                    <div class="mt-4 pt-3 border-t border-green-200/50 relative z-10 w-full text-center">
                        <p class="text-xs text-green-700 font-medium">电子签署人</p>
                        <p class="font-black text-green-800 text-xl tracking-widest mt-0.5">${signerName}</p>
                    </div>
                    <div class="absolute -right-4 -bottom-4 opacity-10 transform rotate-[-15deg] pointer-events-none">
                        <div class="border-[6px] border-green-800 rounded-full w-28 h-28 flex items-center justify-center">
                            <span class="text-green-800 font-black text-3xl">已签</span>
                        </div>
                    </div>
                `;
            }

            modalDynamicContent.innerHTML = `
                <div class="p-8 flex flex-col items-center justify-center w-full min-h-[45vh] fade-in">
                    <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full border-4 flex items-center justify-center mb-5 animate-scan bg-green-50">
                        <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-xl sm:text-2xl font-black text-green-600 mb-2">安全协议已确认</h2>
                    <p class="text-xs sm:text-sm font-bold text-gray-500 tracking-widest mb-6 border-b border-gray-200 pb-2">TIME: ${timeString}</p>
                    
                    <div class="bg-green-50 text-green-800 px-6 py-4 rounded-2xl text-center w-full border border-green-200 shadow-inner relative overflow-hidden">
                        <p class="font-bold text-sm sm:text-base relative z-10">请向现场工作人员出示此凭证</p>
                        <p class="text-[10px] sm:text-xs mt-1 opacity-80 relative z-10">凭此绿码方可入场体验</p>
                        ${signerHtml}
                    </div>
                </div>
            `;
        }

        const hotspots = document.querySelectorAll('.hotspot-ip');
        for (let i = 0; i < hotspots.length; i++) {
            hotspots[i].addEventListener('click', function() {
                const zoneId = this.getAttribute('data-zone');
                const data = zonesData[zoneId];
                
                if (data) {
                    document.getElementById('modal-glow').style.display = 'block';
                    modalCard.style.backgroundColor = 'rgba(255, 255, 255, 0.65)';
                    modalCard.classList.add('border', 'border-white/60');
                    toggleViewportZoom(false);

                    if (data.type === 'pure-intro') {
                        renderPureIntroModal(data); 
                    } else if (data.type === 'flow') {
                        renderFlowStep1(data); 
                    } else if (data.type === 'multi-flow') {
                        renderMultiFlowStep1(data); 
                    }

                    modalCard.classList.remove('modal-enter');
                    void modalCard.offsetWidth; 
                    modalCard.classList.add('modal-enter');
                    modal.classList.remove('hidden');
                }
            });
        }

        const closeModal = () => {
            modal.classList.add('hidden');
            toggleViewportZoom(false);
        }
        modalOverlay.addEventListener('click', closeModal);
    </script>
</body>
</html>
