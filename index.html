<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" id="viewport-meta" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#F8D36A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>活在热爱里 - 社区地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #F8D36A;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
            overscroll-behavior-y: none; 
        }

        .view-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh; 
            height: 100dvh; 
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #view-intro { z-index: 30; }
        #view-rotate { background-color: #333; color: white; z-index: 40; }
        #view-guide { display: none; z-index: 25; background-color: #F8D36A; align-items: flex-start; }
        #view-map { display: none; z-index: 20; background-color: #F8D36A; align-items: flex-start; }

        @keyframes phoneRotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }
        .animate-phone { animation: phoneRotate 2s ease-in-out infinite; }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-6deg); }
            75% { transform: rotate(6deg); }
        }
        .animate-sway { 
            animation: sway 3s ease-in-out infinite; 
            transform-origin: bottom center; 
        }

        @keyframes pan {
            0%, 100% { transform: translateX(0px); }
            50% { transform: translateX(-15px); }
        }
        .animate-pan { animation: pan 4s ease-in-out infinite; }

        @keyframes drive {
            0%, 100% { transform: translateX(0px); }
            50% { transform: translateX(15px); }
        }
        .animate-drive { animation: drive 3.5s ease-in-out infinite; }

        @keyframes scanGlow {
            0% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.8); border-color: rgba(16, 185, 129, 1); }
            100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.3); }
        }
        .animate-scan { animation: scanGlow 2s infinite; }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.2s; }
        .delay-3 { animation-delay: 1.8s; }

        .modal-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .scroll-container {
            width: 100vw;
            height: 100vh; 
            height: 100dvh;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch; 
            position: relative;
            overscroll-behavior-y: none;
        }
        
        .map-wrapper {
            height: 100%;
            position: relative;
            display: inline-block; 
        }

        .map-bg-img {
            height: 100%; 
            width: auto;  
            max-width: none;
            display: block;
        }

        .hotspot-ip {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            --tx: 0px;
            --ty: 0px;
            --scale: 1;
            transform: translate(var(--tx), var(--ty)) scale(var(--scale));
        }
        .hotspot-ip:active { 
            --scale: 0.95; 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
    </style>
</head>
<body class="antialiased text-gray-800">

    <!-- ================= 视图 1：竖屏开启页 ================= -->
    <div id="view-intro" class="view-layer relative overflow-hidden cursor-pointer">
        <img src="assets/intro-bg.jpg" class="absolute inset-0 w-full h-full object-cover z-0" alt="活动海报">
        <video 
            id="intro-video"
            src="assets/intro-bg.mp4" 
            poster="assets/intro-bg.jpg"
            autoplay 
            muted 
            playsinline 
            webkit-playsinline
            x5-video-player-type="h5"
            x5-video-player-fullscreen="true"
            class="absolute inset-0 w-full h-full object-cover z-10"
        ></video>
    </div>

    <!-- ================= 视图 2：旋转手机提示页 ================= -->
    <div id="view-rotate" class="view-layer">
        <div class="flex flex-col items-center">
            <div class="w-16 h-28 border-4 border-white rounded-xl mb-6 flex items-center justify-center animate-phone">
                <div class="w-10 h-20 bg-white/20 rounded-sm"></div>
            </div>
            <h2 class="text-2xl font-bold mb-2">为了更好的体验</h2>
            <p class="text-gray-300">请解锁方向锁定，并将手机横过来观看</p>
        </div>
    </div>

    <!-- ================= 🌟 视图 3：横向强制引导页 ================= -->
    <div id="view-guide" class="view-layer">
        <div class="scroll-container">
            <div class="map-wrapper">
                <img src="assets/guide-bg.webp" alt="活动引导" class="map-bg-img" onerror="console.error('找不到活动引导图片，请检查 assets/guide-bg.webp')">
                
                <!-- 🌟 划到末端才会见到的关闭叉叉 -->
                <button id="btn-close-guide" class="absolute top-4 right-4 sm:top-6 sm:right-6 z-50 transform transition active:scale-90 cursor-pointer w-12 h-12 sm:w-16 sm:h-16 shrink-0">
                    <img src="assets/close-btn.png" class="w-full h-full object-contain drop-shadow-lg" alt="关闭" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="hidden w-10 h-10 bg-black/50 text-white rounded-full flex items-center justify-center font-bold text-xl backdrop-blur-sm border border-white/50">✕</div>
                </button>
            </div>
        </div>
    </div>

    <!-- ================= 视图 4：横向地图主页 ================= -->
    <div id="view-map" class="view-layer">
        <div class="scroll-container">
            <div class="map-wrapper">
                
                <img src="assets/map-horizontal.webp" alt="活动地图" class="map-bg-img" onerror="console.error('找不到地图背景，请检查路径')">

                <!-- 痛车 -->
                <div class="hotspot-ip z-20" style="top: 50%; left: 5%; --tx: -50%; --ty: -50%;" data-zone="departure">
                    <img src="assets/ip_tongche.webp" alt="痛车" class="w-40 sm:w-56 object-contain animate-drive drop-shadow-xl" onerror="this.style.display='none';">
                </div>

                <!-- 👦 男孩 (C区 热爱起跑线) -->
                <div class="hotspot-ip z-20" style="top: 78%; left: 11%; --tx: -50%; --ty: -50%;" data-zone="zone_c">
                    <img src="assets/ip-boy.png" alt="男孩" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway drop-shadow-lg">
                </div>

                <!-- 🐻 熊1 (B区 攀岩墙) -->
                <div class="hotspot-ip z-20" style="top: 25%; left: 18%; --tx: -50%; --ty: -50%;" data-zone="climbing">
                    <img src="assets/ip-bear.png" alt="大熊" class="w-32 h-32 sm:w-48 sm:h-48 object-contain animate-sway delay-1 drop-shadow-lg">
                </div>

                <!-- 🐸 青蛙 (D区 撒野营) -->
                <div class="hotspot-ip z-20" style="top: 45%; left: 25%; --tx: -50%; --ty: -50%;" data-zone="zone_d">
                    <img src="assets/ip-frog.png" alt="青蛙" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-2 drop-shadow-lg">
                </div>

                <!-- 🚌 巴士1 (E区 IP聚会场) 🌟 高度调整为与第二辆一致 -->
                <div class="hotspot-ip z-30" style="top: 49%; left: 34%; --tx: -50%; --ty: -50%;" data-zone="zone_e">
                    <img src="assets/ip-bus.png" alt="巴士" class="w-60 sm:w-[350px] object-contain animate-pan drop-shadow-xl">
                </div>

                <!-- 🐰 兔子 (G区 限时痛店) -->
                <div class="hotspot-ip z-20" style="top: 15%; left: 51%;" data-zone="zone_g">
                    <img src="assets/ip-rabbit.png" alt="兔子" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-1 drop-shadow-lg">
                </div>

                <!-- 💰 隐藏热区：H区 金币补给站 (现在用 golden.png 显示，和 boy 顶端对齐) -->
                <div class="hotspot-ip z-30" style="top: 78%; left: 57.5%; --tx: -50%; --ty: -50%;" data-zone="zone_h">
                    <img src="assets/golden.png" alt="金币" class="w-16 h-16 sm:w-24 sm:h-24 object-contain animate-sway delay-2 drop-shadow-lg" onerror="this.style.display='none';">
                </div>

                <!-- 🐙 章鱼 (泡泡乐园) -->
                <div class="hotspot-ip z-20" style="top: 24%; left: 64%;" data-zone="bubble">
                    <img src="assets/ip-octopus.png" alt="章鱼" class="w-24 h-24 sm:w-36 sm:h-36 object-contain animate-sway delay-3 drop-shadow-lg">
                </div>

                <!-- 🐘 大象 (动力街区) -->
                <div class="hotspot-ip z-20" style="top: 24%; left: 70%;" data-zone="powerblock">
                    <img src="assets/ip-elephant.png" alt="大象" class="w-24 h-24 sm:w-32 sm:h-32 object-contain animate-sway delay-2 drop-shadow-lg">
                </div>

                <!-- 🚌 巴士2 -->
                <div class="absolute z-30 flex flex-col items-center pointer-events-none" style="top: 49%; left: 72%;">
                    <img src="assets/ip-bus.png" alt="巴士" class="w-60 sm:w-[350px] object-contain animate-pan delay-1 drop-shadow-xl">
                </div>

                <!-- 🐻 熊2 (K区 萌宠乐园) -->
                <div class="hotspot-ip z-10" style="top: 35%; left: 87%; --tx: -50%; --ty: -50%;" data-zone="zone_k">
                    <img src="assets/ip-bear.png" alt="小熊" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-3 drop-shadow-lg">
                </div>

            </div>
        </div>

        <!-- ================= 左上角：重开引导图指南针 ================= -->
        <!-- 🌟 修改点：给这个按钮加上 origin-center 和更全面的 transition-all 类 -->
        <button id="btn-reopen-guide" class="fixed top-4 left-4 sm:top-6 sm:left-6 z-40 hidden active:scale-90 transition-all duration-300 w-14 h-14 sm:w-16 sm:h-16 shrink-0 cursor-pointer origin-center">
            <img src="assets/guide-icon.png" class="w-full h-full object-contain drop-shadow-md" alt="入场指引" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="hidden bg-white/80 backdrop-blur-md px-3 py-2 border border-white/50 rounded-xl shadow-md items-center font-bold text-orange-600 text-xs sm:text-sm">
                <span class="text-lg mr-1">🗺️</span>指引
            </div>
        </button>

        <!-- ================= 缩小后的左下角固定时间 ================= -->
        <div id="fixed-time-display" class="fixed left-2 bottom-3 sm:left-4 sm:bottom-4 z-40 flex flex-col transition-opacity duration-300 drop-shadow-md pointer-events-none" style="display: none;">
            <div class="text-orange-600 font-black text-[11px] sm:text-xs tracking-wider flex items-center mb-0.5">
                <span class="mr-1 text-sm sm:text-base opacity-90">🕒</span> 
                2026.04.25 <span class="mx-1 font-normal text-orange-500/80">—</span> 05.17
            </div>
            <div class="text-orange-600 font-black text-[7px] sm:text-[9px] tracking-widest ml-5 flex items-center">
                工作日: 10:00-20:00 <span class="mx-0.5 opacity-50 font-normal">|</span> 周末/节假日: 10:00-21:00
            </div>
        </div>

        <!-- ================= 右下角横向毛绒悬浮菜单 ================= -->
        <div id="floating-menu" class="fixed right-3 bottom-4 sm:right-6 sm:bottom-6 z-40 flex flex-row items-end gap-2 sm:gap-3 transition-opacity duration-300" style="display: none;">
            <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="benefit">
                <img src="assets/small icon 1.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="打卡福利">
            </button>
            <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="coin">
                <img src="assets/small icon 2.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="金币玩法">
            </button>
            <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="shop">
                <img src="assets/small icon 3.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="限时痛店">
            </button>
            <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="calendar">
                <img src="assets/small icon 4.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="活动课表">
            </button>
            <button class="float-btn relative w-12 h-16 sm:w-16 sm:h-20 shrink-0 transform transition active:scale-90 cursor-pointer" data-float="register">
                <img src="assets/small icon 5.png" class="w-full h-full object-contain filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.3)]" alt="活动报名">
            </button>
        </div>
    </div>

    <!-- ================= 弹窗组件 ================= -->
    <div id="info-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity cursor-pointer" id="modal-overlay"></div>
        <div id="modal-card" class="w-full max-w-lg max-h-[85dvh] rounded-[32px] overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.15)] z-10 flex flex-col modal-enter relative border border-white/60" style="background-color: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">
            <div id="modal-glow" class="absolute top-0 right-0 w-full h-48 opacity-40 pointer-events-none transition-colors duration-500" style="background: radial-gradient(circle at 80% 0%, var(--theme-color), transparent 70%);"></div>
            <div id="modal-dynamic-content" class="w-full flex-1 flex flex-col overflow-hidden relative z-10"></div>
        </div>
    </div>

    <script>
        const viewIntro = document.getElementById('view-intro');
        const viewRotate = document.getElementById('view-rotate');
        const viewGuide = document.getElementById('view-guide');
        const viewMap = document.getElementById('view-map');
        const floatingMenu = document.getElementById('floating-menu');
        const fixedTimeDisplay = document.getElementById('fixed-time-display');
        const btnCloseGuide = document.getElementById('btn-close-guide');
        const btnReopenGuide = document.getElementById('btn-reopen-guide');
        
        let hasStarted = false;
        let hasSeenGuide = false;

        function checkOrientation() {
            if (!hasStarted) return; 
            const isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape) {
                viewIntro.style.display = 'none';
                viewRotate.style.display = 'none';
                
                if (!hasSeenGuide) {
                    viewGuide.style.display = 'flex';
                    viewMap.style.display = 'none';
                    floatingMenu.style.display = 'none';
                    fixedTimeDisplay.style.display = 'none';
                } else {
                    viewGuide.style.display = 'none';
                    viewMap.style.display = 'flex';
                    floatingMenu.style.display = 'flex'; 
                    fixedTimeDisplay.style.display = 'flex';
                    btnReopenGuide.style.display = 'block';
                }
            } else {
                viewIntro.style.display = 'none';
                viewGuide.style.display = 'none';
                viewMap.style.display = 'none';
                viewRotate.style.display = 'flex';
                floatingMenu.style.display = 'none'; 
                fixedTimeDisplay.style.display = 'none'; 
                btnReopenGuide.style.display = 'none';
            }
        }

        // 🌟 划到尽头点击叉叉关闭引导图：加入高级“转场飞入”动画
        btnCloseGuide.addEventListener('click', (e) => {
            // 1. 瞬间锁定“叉叉”当前的屏幕物理坐标
            const startRect = btnCloseGuide.getBoundingClientRect();
            
            hasSeenGuide = true;
            
            // 2. 提前把左上角指南针变成透明缩小状态，假装还没出来
            btnReopenGuide.classList.add('opacity-0', 'scale-50');
            btnReopenGuide.style.transition = 'none'; // 禁用它的隐藏动画
            
            // 3. 瞬间切换视图（长图隐藏，地图显现）
            checkOrientation(); 
            
            // 4. 等待一帧让浏览器渲染出目标指南针的位置
            requestAnimationFrame(() => {
                const targetRect = btnReopenGuide.getBoundingClientRect();
                
                // 5. 创建一个飞行的替身元素（叉叉图片）
                const flyer = document.createElement('img');
                flyer.src = 'assets/close-btn.png';
                flyer.style.position = 'fixed';
                flyer.style.left = startRect.left + 'px';
                flyer.style.top = startRect.top + 'px';
                flyer.style.width = startRect.width + 'px';
                flyer.style.height = startRect.height + 'px';
                flyer.style.zIndex = '9999';
                flyer.style.transition = 'all 0.7s cubic-bezier(0.25, 1, 0.5, 1)'; // 丝滑减速曲线
                flyer.style.pointerEvents = 'none';
                flyer.style.filter = 'drop-shadow(0 10px 15px rgba(0,0,0,0.3))';
                document.body.appendChild(flyer);
                
                // 6. 下一帧开始飞行！
                requestAnimationFrame(() => {
                    // 飞向指南针的位置
                    flyer.style.left = targetRect.left + 'px';
                    flyer.style.top = targetRect.top + 'px';
                    flyer.style.width = targetRect.width + 'px';
                    flyer.style.height = targetRect.height + 'px';
                    // 渐隐并增加酷炫的旋转效果
                    flyer.style.opacity = '0.1';
                    flyer.style.transform = 'rotate(-360deg)';
                    
                    // 7. 动画结束后的善后工作
                    setTimeout(() => {
                        flyer.remove(); // 销毁替身
                        
                        // 真正的指南针带有弹性的“POP”地一声弹出来
                        btnReopenGuide.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                        btnReopenGuide.classList.remove('opacity-0', 'scale-50');
                        
                        // 动画播完后清理样式，保证你正常点击时的缩小手感依然有效
                        setTimeout(() => {
                            btnReopenGuide.style.transition = '';
                        }, 500);
                        
                    }, 700); // 700ms 飞行时间
                });
            });
        });

        // 重新打开引导图
        btnReopenGuide.addEventListener('click', () => {
            hasSeenGuide = false;
            checkOrientation();
        });

        viewIntro.addEventListener('click', () => {
            hasStarted = true;
            checkOrientation(); 
        });

        const introVideo = document.getElementById('intro-video');
        if (introVideo) {
            introVideo.addEventListener('ended', () => {
                hasStarted = true;
                checkOrientation();
            });
            document.addEventListener("WeixinJSBridgeReady", function() {
                introVideo.play().catch(() => {});
            }, false);
        }

        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', () => { setTimeout(checkOrientation, 200); });
        viewIntro.style.display = 'flex';

        const viewportMeta = document.getElementById('viewport-meta');
        function toggleViewportZoom(allow) {
            if(allow) {
                viewportMeta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover');
            } else {
                viewportMeta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
            }
        }


        // ==========================================
        // 🌟 1. 热区数据与 HTML 配置区
        // ==========================================
        const commonFooterHtml = `
            <div>
                <h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">天气与活动调整</h4>
                <ul class="list-disc pl-4 space-y-1 text-gray-700">
                    <li>遇大风、降雨（含小雨）、雷电等恶劣天气，活动将暂停开放，请以现场公告及官方渠道通知为准。</li>
                    <li>如遇不可抗力或活动临时调整，主办方将及时通过官方平台发布信息。</li>
                </ul>
            </div>
            <div>
                <h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">其他说明</h4>
                <p class="text-gray-700">活动期间请遵守现场秩序，听从工作人员管理。入场参加活动即视为您已仔细阅读、充分理解并同意遵守本活动的全部规则及免责条款。主办方在法律允许范围内保留对活动规则及须知的最终解释权。感谢您的理解与配合，祝您游玩愉快。</p>
            </div>
        `;

                        </div>
                        <button id="btn-read-safety" class="w-full flex-shrink-0 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-[0_8px_20px_rgba(249,115,22,0.3)] transform transition active:scale-95 text-sm sm:text-base">
                            📄 阅读入场安全须知
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('btn-read-safety').addEventListener('click', () => {
                renderFlowStep2(data.rulesTitle, data.rulesHtml, null, data.agreementTitle, data.agreementHtml);
            });
        }

        function renderMultiFlowStep1(data) {
            document.getElementById('modal-glow').style.setProperty('--theme-color', data.themeColor);
            const buttonsHtml = data.options.map((opt, index) => `
                <button onclick="window.triggerMultiOption('${data.id}', ${index})" class="w-full flex-shrink-0 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-[0_8px_20px_rgba(249,115,22,0.3)] transform transition active:scale-95 text-sm sm:text-base mb-3.5">
                    ${opt.btnText}
                </button>
            `).join('');

            modalDynamicContent.innerHTML = `
                <div class="p-6 sm:p-8 flex flex-col items-center h-full overflow-y-auto custom-scrollbar fade-in">
                    <div class="my-auto w-full flex flex-col items-center">
                        <h2 class="text-3xl sm:text-4xl font-black text-orange-600 tracking-widest mb-6 drop-shadow-sm flex-shrink-0">${data.title}</h2>
                        <div class="text-center space-y-2 mb-8 flex-shrink-0">
                            <p class="text-lg sm:text-xl font-bold text-orange-800 leading-relaxed">${data.highlight}</p>
                            <p class="text-xs sm:text-sm text-orange-600/80 font-medium leading-relaxed">${data.subHighlight}</p>
                        </div>
                        <div class="w-full flex-shrink-0">
                            ${buttonsHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        window.triggerMultiOption = (zoneId, optionIndex) => {
            const opt = zonesData[zoneId].options[optionIndex];
            renderFlowStep2(opt.rulesTitle, opt.rulesHtml, null, opt.agreementTitle, opt.agreementHtml);
        };

        window.renderFlowStep2 = function(rulesTitle, rulesHtml, backAction = null, agreementTitle = null, agreementHtml = null) {
            const backBtnHtml = backAction ? `
                <button onclick="${backAction}" class="absolute left-4 top-6 text-orange-600 font-bold text-sm flex items-center z-20 active:scale-95 transition">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>返回
                </button>
            ` : '';

            const btnText = agreementHtml ? '已阅须知，下一步：签署安全协议' : '我已阅读并接受此须知，为自己安全负责';

            modalDynamicContent.innerHTML = `
                <div class="flex flex-col h-full fade-in max-h-[85dvh]">
                    <div class="pt-6 pb-3 px-4 text-center border-b border-orange-200/50 flex-shrink-0 relative flex justify-center items-center">
                        ${backBtnHtml}
                        <h3 class="text-lg sm:text-xl font-black text-orange-800 leading-snug px-10">${rulesTitle}</h3>
                    </div>
                    <div class="p-5 sm:p-6 overflow-y-auto custom-scrollbar flex-1 text-xs sm:text-sm text-gray-800 leading-relaxed space-y-5 bg-orange-50/50">
                        ${rulesHtml}
                    </div>
                    <div class="p-4 bg-white/80 backdrop-blur-md border-t border-gray-100 flex-shrink-0 rounded-b-[32px]">
                        <button id="btn-accept-rules" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-[0_8px_20px_rgba(234,88,12,0.3)] transform transition active:scale-95 text-sm sm:text-base flex justify-center items-center">
                            ${btnText}
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('btn-accept-rules').addEventListener('click', () => {
                if (agreementHtml) {
                    renderAgreementStep(agreementTitle, agreementHtml, rulesTitle, rulesHtml, backAction);
                } else {
                    renderPassStep3();
                }
            });
        }

        window.renderAgreementStep = function(title, html, rulesTitle, rulesHtml, originalBackAction) {
            window.goBackToRules = function() {
                renderFlowStep2(rulesTitle, rulesHtml, originalBackAction, title, html);
            };

            modalDynamicContent.innerHTML = `
                <div class="flex flex-col h-full fade-in max-h-[85dvh]">
                    <div class="pt-6 pb-3 px-4 text-center border-b border-orange-200/50 flex-shrink-0 relative flex justify-center items-center bg-orange-50">
                        <button onclick="window.goBackToRules()" class="absolute left-4 top-6 text-orange-600 font-bold text-sm flex items-center z-20 active:scale-95 transition">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>返回
                        </button>
                        <h3 class="text-lg sm:text-xl font-black text-orange-800 leading-snug px-10">${title}</h3>
                    </div>
                    <div class="p-5 sm:p-6 overflow-y-auto custom-scrollbar flex-1 bg-white/60">
                        ${html}
                    </div>
                    <div class="p-4 bg-white/90 backdrop-blur-md border-t border-gray-200 flex-shrink-0 rounded-b-[32px] flex flex-col items-center">
                        <div class="w-full bg-orange-50/50 p-3 rounded-xl border border-orange-100 mb-3 shadow-inner">
                            <p class="text-xs text-orange-800 font-bold mb-2">请填写本人（或监护人）真实姓名完成签署：</p>
                            <input type="text" id="signer-name" placeholder="请输入姓名" class="w-full bg-white border border-orange-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors">
                        </div>
                        <button id="btn-sign-agreement" disabled class="w-full bg-gray-400 text-white font-bold py-3.5 px-4 rounded-xl transition text-sm sm:text-base flex justify-center items-center cursor-not-allowed">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            同意并电子签署协议
                        </button>
                    </div>
                </div>
            `;

            const nameInput = document.getElementById('signer-name');
            const signBtn = document.getElementById('btn-sign-agreement');

            nameInput.addEventListener('input', (e) => {
                if (e.target.value.trim().length > 0) {
                    signBtn.disabled = false;
                    signBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
                    signBtn.classList.add('bg-green-600', 'hover:bg-green-700', 'shadow-[0_8px_20px_rgba(16,185,129,0.3)]', 'active:scale-95');
                } else {
                    signBtn.disabled = true;
                    signBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                    signBtn.classList.remove('bg-green-600', 'hover:bg-green-700', 'shadow-[0_8px_20px_rgba(16,185,129,0.3)]', 'active:scale-95');
                }
            });

            signBtn.addEventListener('click', () => {
                const name = nameInput.value.trim();
                if(name) {
                    renderPassStep3(name);
                }
            });
        }

        window.renderPassStep3 = function(signerName = '') {
            document.getElementById('modal-glow').style.setProperty('--theme-color', '#10B981');
            const now = new Date();
            const timeString = `${now.getMonth()+1}月${now.getDate()}日 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            let signerHtml = '';
            if (signerName) {
                signerHtml = `
                    <div class="mt-4 pt-3 border-t border-green-200/50 relative z-10 w-full text-center">
                        <p class="text-xs text-green-700 font-medium">电子签署人</p>
                        <p class="font-black text-green-800 text-xl tracking-widest mt-0.5">${signerName}</p>
                    </div>
                    <div class="absolute -right-4 -bottom-4 opacity-10 transform rotate-[-15deg] pointer-events-none">
                        <div class="border-[6px] border-green-800 rounded-full w-28 h-28 flex items-center justify-center">
                            <span class="text-green-800 font-black text-3xl">已签</span>
                        </div>
                    </div>
                `;
            }

            modalDynamicContent.innerHTML = `
                <div class="p-8 flex flex-col items-center justify-center min-h-[45vh] fade-in">
                    <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full border-4 flex items-center justify-center mb-5 animate-scan bg-green-50">
                        <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-xl sm:text-2xl font-black text-green-600 mb-2">安全协议已确认</h2>
                    <p class="text-xs sm:text-sm font-bold text-gray-500 tracking-widest mb-6 border-b border-gray-200 pb-2">TIME: ${timeString}</p>
                    
                    <div class="bg-green-50 text-green-800 px-6 py-4 rounded-2xl text-center w-full border border-green-200 shadow-inner relative overflow-hidden">
                        <p class="font-bold text-sm sm:text-base relative z-10">请向现场工作人员出示此凭证</p>
                        <p class="text-[10px] sm:text-xs mt-1 opacity-80 relative z-10">凭此绿码方可入场体验</p>
                        ${signerHtml}
                    </div>
                </div>
            `;
        }

        const hotspots = document.querySelectorAll('.hotspot-ip');
        hotspots.forEach(hotspot => {
            hotspot.addEventListener('click', () => {
                const zoneId = hotspot.getAttribute('data-zone');
                const data = zonesData[zoneId];
                
                if (data) {
                    // 初始化重置弹窗样式
                    document.getElementById('modal-glow').style.display = 'block';
                    modalCard.style.backgroundColor = 'rgba(255, 255, 255, 0.65)';
                    modalCard.classList.add('border', 'border-white/60');
                    toggleViewportZoom(false);

                    if (data.type === 'pure-intro') {
                        renderPureIntroModal(data); 
                    } else if (data.type === 'intro') {
                        renderIntroModal(data); 
                    } else if (data.type === 'flow') {
                        renderFlowStep1(data); 
                    } else if (data.type === 'multi-flow') {
                        renderMultiFlowStep1(data); 
                    }

                    modalCard.classList.remove('modal-enter');
                    void modalCard.offsetWidth; 
                    modalCard.classList.add('modal-enter');
                    modal.classList.remove('hidden');
                }
            });
        });

        const closeModal = () => {
            modal.classList.add('hidden');
            toggleViewportZoom(false);
        }
        modalOverlay.addEventListener('click', closeModal);

    </script>
</body>
</html>
