<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 🌟 新增：尝试把部分安卓/微信底栏染成黄色 -->
    <meta name="theme-color" content="#F8D36A">
    
    <!-- iOS 专属沉浸式全屏配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>活在热爱里 - 社区地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #F8D36A;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
            overscroll-behavior-y: none; 
        }

        .view-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh; 
            height: 100dvh; 
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #view-intro { z-index: 30; }
        #view-rotate { background-color: #333; color: white; z-index: 40; }
        #view-map { display: block; z-index: 20; background-color: #F8D36A; }

        @keyframes phoneRotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }
        .animate-phone { animation: phoneRotate 2s ease-in-out infinite; }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-6deg); }
            75% { transform: rotate(6deg); }
        }
        .animate-sway { 
            animation: sway 3s ease-in-out infinite; 
            transform-origin: bottom center; 
        }

        @keyframes pan {
            0%, 100% { transform: translateX(0px); }
            50% { transform: translateX(-15px); }
        }
        .animate-pan { animation: pan 4s ease-in-out infinite; }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.2s; }
        .delay-3 { animation-delay: 1.8s; }

        .modal-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .scroll-container {
            width: 100vw;
            height: 100vh; 
            height: 100dvh;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch; 
            position: relative;
            overscroll-behavior-y: none;
        }
        
        .map-wrapper {
            height: 100%;
            position: relative;
            display: inline-block; 
        }

        .map-bg-img {
            height: 100%; 
            width: auto;  
            max-width: none;
            display: block;
        }

        .hotspot-ip {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hotspot-ip:active { transform: scale(0.95); }

        .fallback-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
    </style>
</head>
<body class="antialiased text-gray-800">

    <!-- ================= 视图 1：竖屏开启页 ================= -->
    <div id="view-intro" class="view-layer relative overflow-hidden cursor-pointer">
        <img src="assets/intro-bg.jpg" class="absolute inset-0 w-full h-full object-cover z-0" alt="活动海报">
        <video 
            id="intro-video"
            src="assets/intro-bg.mp4" 
            poster="assets/intro-bg.jpg"
            autoplay 
            muted 
            playsinline 
            webkit-playsinline
            x5-video-player-type="h5"
            x5-video-player-fullscreen="true"
            class="absolute inset-0 w-full h-full object-cover z-10"
        ></video>
    </div>

    <!-- ================= 视图 2：旋转手机提示页 ================= -->
    <div id="view-rotate" class="view-layer">
        <div class="flex flex-col items-center">
            <div class="w-16 h-28 border-4 border-white rounded-xl mb-6 flex items-center justify-center animate-phone">
                <div class="w-10 h-20 bg-white/20 rounded-sm"></div>
            </div>
            <h2 class="text-2xl font-bold mb-2">为了更好的体验</h2>
            <p class="text-gray-300">请解锁方向锁定，并将手机横过来观看</p>
        </div>
    </div>

    <!-- ================= 视图 3：横向地图主页 ================= -->
    <div id="view-map" class="view-layer" style="display: none; align-items: flex-start;">
        <div class="scroll-container">
            <div class="map-wrapper">
                
                <img src="assets/map-horizontal-2.jpg" alt="活动地图" class="map-bg-img" onerror="console.error('找不到地图背景，请检查路径')">

                <!-- 1. 男孩 Boy -->
                <div class="hotspot-ip z-20" style="top: 44%; left: 11%;" data-zone="entrance">
                    <img src="assets/ip-boy.png" alt="男孩" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway hidden">👦</div>
                </div>

                <!-- 2. 大熊 Bear -->
                <div class="absolute z-10 flex flex-col items-center pointer-events-none" style="top: -14%; left: 16%;">
                    <img src="assets/ip-bear.png" alt="大熊" class="w-32 h-32 sm:w-48 sm:h-48 object-contain animate-sway delay-1 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-1 hidden">🐻</div>
                </div>

                <!-- 3. 青蛙 Frog -->
                <div class="hotspot-ip z-20" style="top: 17%; left: 22%;" data-zone="stage">
                    <img src="assets/ip-frog.png" alt="青蛙" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-2 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-2 hidden">🐸</div>
                </div>

                <!-- 4. 巴士 Bus 1 -->
                <div class="absolute z-30 flex flex-col items-center pointer-events-none" style="top: 47%; left: 34%;">
                    <img src="assets/ip-bus.png" alt="巴士" class="w-60 sm:w-[350px] object-contain animate-pan drop-shadow-xl" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-pan hidden">🚌</div>
                </div>

                <!-- 5. 兔子 Rabbit -->
                <div class="hotspot-ip z-20" style="top: 15%; left: 51%;" data-zone="shop">
                    <img src="assets/ip-rabbit.png" alt="兔子" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-1 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-1 hidden">🐰</div>
                </div>

                <!-- 6. 章鱼/粉色球 Octopus -->
                <div class="absolute z-10 flex flex-col items-center pointer-events-none" style="top: 19%; left: 64%;">
                    <img src="assets/ip-octopus.png" alt="章鱼" class="w-24 h-24 sm:w-36 sm:h-36 object-contain animate-sway delay-3 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-3 hidden">🐙</div>
                </div>

                <!-- 7. 大象 Elephant -->
                <div class="absolute z-10 flex flex-col items-center pointer-events-none" style="top: 24%; left: 70%;">
                    <img src="assets/ip-elephant.png" alt="大象" class="w-24 h-24 sm:w-32 sm:h-32 object-contain animate-sway delay-2 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-2 hidden">🐘</div>
                </div>

                <!-- 8. 巴士 Bus 2 -->
                <div class="absolute z-30 flex flex-col items-center pointer-events-none" style="top: 49%; left: 72%;">
                    <img src="assets/ip-bus.png" alt="巴士" class="w-60 sm:w-[350px] object-contain animate-pan delay-1 drop-shadow-xl" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-pan delay-1 hidden">🚌</div>
                </div>

                <!-- 9. 企鹅 Penguin -->
                <div class="hotspot-ip z-20" style="top: 2%; left: 79%;" data-zone="pet">
                    <img src="assets/ip-penguin.png" alt="企鹅" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-1 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-1 hidden">🐧</div>
                </div>

                <!-- 10. 第二只小熊 Bear -->
                <div class="absolute z-10 flex flex-col items-center pointer-events-none" style="top: 2%; left: 86%;">
                    <img src="assets/ip-bear.png" alt="小熊" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-3 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-3 hidden">🐻</div>
                </div>

            </div>
        </div>
    </div>

    <!-- ================= 🌟 弹窗组件：Apple 高级磨砂玻璃质感版 ================= -->
    <div id="info-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        
        <!-- 遮罩层：保留透明度，点击即可关闭 -->
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity cursor-pointer" id="modal-overlay"></div>
        
        <!-- 卡片主体：高透光白 + 极强磨砂 + 大圆角 -->
        <!-- 去掉了生硬的背景色块和关闭按钮 -->
        <div id="modal-card" class="w-full max-w-sm max-h-[85dvh] rounded-[32px] overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.15)] z-10 flex flex-col modal-enter relative border border-white/60" style="background-color: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">
            
            <!-- 🌟 氛围呼吸灯 (Glow)：这是一个绝密的氛围魔法，会根据你点击的不同区域，在弹窗右上角透出柔和的主题色光晕 -->
            <div id="modal-glow" class="absolute top-0 right-0 w-full h-48 opacity-40 pointer-events-none transition-colors duration-500" style="background: radial-gradient(circle at 80% 0%, var(--theme-color), transparent 70%);"></div>

            <div class="p-6 sm:p-8 overflow-y-auto relative z-10 flex flex-col items-center">
                
                <!-- 标题区：极简留白 -->
                <h2 id="modal-title" class="text-2xl sm:text-3xl font-black text-gray-800 tracking-wide mb-3">标题</h2>
                
                <!-- 一句话亮点：高级药丸设计 -->
                <div id="modal-highlight" class="inline-block px-4 py-1.5 rounded-full text-xs sm:text-sm font-bold shadow-sm border border-white/60 mb-6">
                    一句话亮点
                </div>

                <!-- 规则详情容器：包裹在一层更白的微磨砂容器里 -->
                <div class="w-full space-y-3 bg-white/50 rounded-2xl p-4 sm:p-5 border border-white/50 shadow-inner" id="modal-rules">
                    <!-- 动态规则注入点 -->
                </div>

                <!-- 底部弱化提示 -->
                <div class="mt-6 text-[10px] sm:text-xs text-gray-500/80 font-medium" id="modal-notice">
                    * 现场活动以实际安排为准
                </div>
            </div>
        </div>
    </div>

    <script>
        // === 屏幕状态与横竖屏检测 ===
        const viewIntro = document.getElementById('view-intro');
        const viewRotate = document.getElementById('view-rotate');
        const viewMap = document.getElementById('view-map');
        
        let hasStarted = false;

        function checkOrientation() {
            if (!hasStarted) return; 
            const isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape) {
                viewIntro.style.display = 'none';
                viewRotate.style.display = 'none';
                viewMap.style.display = 'flex';
            } else {
                viewIntro.style.display = 'none';
                viewMap.style.display = 'none';
                viewRotate.style.display = 'flex';
            }
        }

        viewIntro.addEventListener('click', () => {
            hasStarted = true;
            checkOrientation(); 
        });

        const introVideo = document.getElementById('intro-video');
        if (introVideo) {
            introVideo.addEventListener('ended', () => {
                hasStarted = true;
                checkOrientation();
            });

            document.addEventListener("WeixinJSBridgeReady", function() {
                introVideo.play().catch(() => {});
            }, false);
        }

        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', () => { setTimeout(checkOrientation, 200); });
        viewIntro.style.display = 'flex';

        // === 热区与弹窗文案数据 ===
        const zonesData = {
            'entrance': {
                title: '👦 核心出入口',
                themeColor: '#EF4444', highlightColor: '#FEE2E2', highlightText: '#DC2626',
                highlight: '领取你的专属热爱地图！',
                rules: [
                    '📍 <strong>Step 1</strong>：扫码关注官方账号',
                    '🗺️ <strong>Step 2</strong>：向工作人员领取纸质地图',
                    '🎁 <strong>Step 3</strong>：开启你的快闪探索之旅！'
                ],
                notice: '小提示：地图限量发放，先到先得哦~'
            },
            'stage': {
                title: '🐸 露营互动区',
                themeColor: '#F59E0B', highlightColor: '#FEF3C7', highlightText: '#D97706',
                highlight: '寻找热爱亮点，参与高燃互动！',
                rules: [
                    '✨ <strong>精彩演出</strong>：定时随机掉落 IP 巡游',
                    '🎮 <strong>互动游戏</strong>：参与问答，赢取金币',
                    '📸 <strong>拍照打卡</strong>：最佳出片机位，千万别错过'
                ]
            },
            'shop': {
                title: '🐰 热爱买手店',
                themeColor: '#10B981', highlightColor: '#D1FAE5', highlightText: '#059669',
                highlight: '总有一款是你热爱！',
                rules: [
                    '👗 汇聚暖心美食与时尚鞋服',
                    '💰 <strong>金币兑换</strong>：使用收集的金币兑换专属权益和盲盒礼品！'
                ]
            },
            'pet': {
                title: '🐧 宠物治愈区',
                themeColor: '#3B82F6', highlightColor: '#DBEAFE', highlightText: '#2563EB',
                highlight: '带上毛孩子一起嗨！',
                rules: [
                    '🦴 <strong>专属区域</strong>：为爱宠提供饮水与玩耍空间',
                    '🎨 <strong>涂鸦共创</strong>：旁边的 Painting 区域可留下专属涂鸦'
                ],
                notice: '请给宠物牵好绳索，保持现场整洁哦'
            }
        };

        const hotspots = document.querySelectorAll('.hotspot-ip');
        const modal = document.getElementById('info-modal');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalCard = document.getElementById('modal-card');

        hotspots.forEach(hotspot => {
            hotspot.addEventListener('click', () => {
                const data = zonesData[hotspot.getAttribute('data-zone')];
                if (data) {
                    document.getElementById('modal-title').innerText = data.title;
                    const elHighlight = document.getElementById('modal-highlight');
                    elHighlight.innerText = data.highlight;
                    
                    // 🌟 给弹窗的呼吸灯注入当前的“主题色”
                    document.getElementById('modal-glow').style.setProperty('--theme-color', data.themeColor);
                    
                    elHighlight.style.backgroundColor = data.highlightColor;
                    elHighlight.style.color = data.highlightText;
                    
                    document.getElementById('modal-rules').innerHTML = data.rules.map(rule => `
                        <div class="flex items-start">
                            <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-2 flex-shrink-0 mt-0.5" style="color: ${data.themeColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                            <span class="text-xs sm:text-sm text-gray-700 leading-relaxed">${rule}</span>
                        </div>
                    `).join('');

                    const elNotice = document.getElementById('modal-notice');
                    if (data.notice) { elNotice.innerText = data.notice; elNotice.style.display = 'block'; } 
                    else { elNotice.style.display = 'none'; }

                    modalCard.classList.remove('modal-enter');
                    void modalCard.offsetWidth; 
                    modalCard.classList.add('modal-enter');
                    modal.classList.remove('hidden');
                }
            });
        });

        // 🌟 完全移除了 X 按钮，现在只有点击遮罩层才能关闭
        const closeModal = () => modal.classList.add('hidden');
        modalOverlay.addEventListener('click', closeModal);
    </script>
</body>
</html>
