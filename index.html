<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#F8D36A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>活在热爱里 - 社区地图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #F8D36A;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
            overscroll-behavior-y: none; 
        }

        .view-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh; 
            height: 100dvh; 
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #view-intro { z-index: 30; }
        #view-rotate { background-color: #333; color: white; z-index: 40; }
        #view-map { display: block; z-index: 20; background-color: #F8D36A; }

        @keyframes phoneRotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }
        .animate-phone { animation: phoneRotate 2s ease-in-out infinite; }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-6deg); }
            75% { transform: rotate(6deg); }
        }
        .animate-sway { 
            animation: sway 3s ease-in-out infinite; 
            transform-origin: bottom center; 
        }

        @keyframes pan {
            0%, 100% { transform: translateX(0px); }
            50% { transform: translateX(-15px); }
        }
        .animate-pan { animation: pan 4s ease-in-out infinite; }

        @keyframes scanGlow {
            0% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.8); border-color: rgba(16, 185, 129, 1); }
            100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.3); }
        }
        .animate-scan { animation: scanGlow 2s infinite; }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.2s; }
        .delay-3 { animation-delay: 1.8s; }

        .modal-enter { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .scroll-container {
            width: 100vw;
            height: 100vh; 
            height: 100dvh;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch; 
            position: relative;
            overscroll-behavior-y: none;
        }
        
        .map-wrapper {
            height: 100%;
            position: relative;
            display: inline-block; 
        }

        .map-bg-img {
            height: 100%; 
            width: auto;  
            max-width: none;
            display: block;
        }

        .hotspot-ip {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hotspot-ip:active { transform: scale(0.95); }

        .fallback-icon { font-size: 3rem; line-height: 1; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
    </style>
</head>
<body class="antialiased text-gray-800">

    <!-- ================= 视图 1：竖屏开启页 ================= -->
    <div id="view-intro" class="view-layer relative overflow-hidden cursor-pointer">
        <img src="assets/intro-bg.jpg" class="absolute inset-0 w-full h-full object-cover z-0" alt="活动海报">
        <video 
            id="intro-video"
            src="assets/intro-bg.mp4" 
            poster="assets/intro-bg.jpg"
            autoplay 
            muted 
            playsinline 
            webkit-playsinline
            x5-video-player-type="h5"
            x5-video-player-fullscreen="true"
            class="absolute inset-0 w-full h-full object-cover z-10"
        ></video>

    <!-- ================= 视图 2：旋转手机提示页 ================= -->

            <h2 class="text-2xl font-bold mb-2">为了更好的体验</h2>

    </div>

    <!-- ================= 视图 3：横向地图主页 ================= -->
    <div id="view-map" class="view-layer" style="display: none; align-items: flex-start;">
        <div class="scroll-container">
            <div class="map-wrapper">
                
                <img src="assets/map-horizontal-2.jpg" alt="活动地图" class="map-bg-img" onerror="console.error('找不到地图背景，请检查路径')">

                <div class="hotspot-ip z-20" style="top: 44%; left: 11%;" data-zone="entrance">

                    <div class="fallback-icon animate-sway hidden">👦</div>

                    <img src="assets/ip-bear.png" alt="大熊" class="w-32 h-32 sm:w-48 sm:h-48 object-contain animate-sway delay-1 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-1 hidden">🐻</div>
                </div>

                <div class="hotspot-ip z-20" style="top: 17%; left: 22%;" data-zone="stage">
                    <img src="assets/ip-frog.png" alt="青蛙" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-2 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">

                    <div class="fallback-icon animate-sway delay-1 hidden">🐰</div>

                <div class="hotspot-ip z-20" style="top: 19%; left: 64%;" data-zone="bubble">

                    <div class="fallback-icon animate-sway delay-3 hidden">🐙</div>

                <div class="hotspot-ip z-20" style="top: 24%; left: 70%;" data-zone="powerblock">
                    <img src="assets/ip-elephant.png" alt="大象" class="w-24 h-24 sm:w-32 sm:h-32 object-contain animate-sway delay-2 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-2 hidden">🐘</div>
                </div>

                <div class="absolute z-30 flex flex-col items-center pointer-events-none" style="top: 49%; left: 72%;">
                    <img src="assets/ip-bus.png" alt="巴士" class="w-60 sm:w-[350px] object-contain animate-pan delay-1 drop-shadow-xl" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-pan delay-1 hidden">🚌</div>
                </div>

                <div class="hotspot-ip z-20" style="top: 2%; left: 79%;" data-zone="pet">
                    <img src="assets/ip-penguin.png" alt="企鹅" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-1 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-1 hidden">🐧</div>
                </div>

                <div class="absolute z-10 flex flex-col items-center pointer-events-none" style="top: 2%; left: 86%;">
                    <img src="assets/ip-bear.png" alt="小熊" class="w-28 h-28 sm:w-40 sm:h-40 object-contain animate-sway delay-3 drop-shadow-lg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="fallback-icon animate-sway delay-3 hidden">🐻</div>
                </div>

            </div>
        </div>

        <!-- ================= 🌟 右下角固定悬浮菜单 (不再使用图片查看器，改用代码生成) ================= -->
        <div id="floating-menu" class="fixed right-3 bottom-6 sm:right-6 sm:bottom-8 z-40 flex flex-col gap-3 transition-opacity duration-300" style="display: none;">
            <button class="float-btn relative w-10 h-10 sm:w-12 sm:h-12 bg-white/80 backdrop-blur-md rounded-full shadow-[0_4px_16px_rgba(0,0,0,0.15)] flex items-center justify-center border border-white/60 transform transition active:scale-90" data-float="benefit">
                <span class="text-xl sm:text-2xl drop-shadow-sm">🎁</span>
            </button>
            <button class="float-btn relative w-10 h-10 sm:w-12 sm:h-12 bg-white/80 backdrop-blur-md rounded-full shadow-[0_4px_16px_rgba(0,0,0,0.15)] flex items-center justify-center border border-white/60 transform transition active:scale-90" data-float="coin">
                <span class="text-xl sm:text-2xl drop-shadow-sm">💰</span>
            </button>
            <button class="float-btn relative w-10 h-10 sm:w-12 sm:h-12 bg-white/80 backdrop-blur-md rounded-full shadow-[0_4px_16px_rgba(0,0,0,0.15)] flex items-center justify-center border border-white/60 transform transition active:scale-90" data-float="shop">
                <span class="text-xl sm:text-2xl drop-shadow-sm">🏪</span>
            </button>
            <button class="float-btn relative w-10 h-10 sm:w-12 sm:h-12 bg-white/80 backdrop-blur-md rounded-full shadow-[0_4px_16px_rgba(0,0,0,0.15)] flex items-center justify-center border border-white/60 transform transition active:scale-90" data-float="calendar">
                <span class="text-xl sm:text-2xl drop-shadow-sm">📅</span>
            </button>
            <button class="float-btn relative w-10 h-10 sm:w-12 sm:h-12 bg-white/80 backdrop-blur-md rounded-full shadow-[0_4px_16px_rgba(0,0,0,0.15)] flex items-center justify-center border border-white/60 transform transition active:scale-90" data-float="location">
                <span class="text-xl sm:text-2xl drop-shadow-sm">📍</span>
            </button>
        </div>
    </div>

    <!-- ================= 🌟 弹窗组件：通用磨砂框 ================= -->
    <div id="info-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity cursor-pointer" id="modal-overlay"></div>
        <div id="modal-card" class="w-full max-w-lg max-h-[85dvh] rounded-[32px] overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.15)] z-10 flex flex-col modal-enter relative border border-white/60" style="background-color: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">
            <!-- 氛围呼吸灯 (Glow) -->
            <div id="modal-glow" class="absolute top-0 right-0 w-full h-48 opacity-40 pointer-events-none transition-colors duration-500" style="background: radial-gradient(circle at 80% 0%, var(--theme-color), transparent 70%);"></div>
            <!-- 动态内容注入区 -->
            <div id="modal-dynamic-content" class="w-full flex-1 flex flex-col overflow-hidden relative z-10"></div>
        </div>
    </div>

    <script>
        // === 屏幕状态与横竖屏检测 ===
        const viewIntro = document.getElementById('view-intro');
        const viewRotate = document.getElementById('view-rotate');
        const viewMap = document.getElementById('view-map');
        const floatingMenu = document.getElementById('floating-menu');
        
        let hasStarted = false;

        function checkOrientation() {
            if (!hasStarted) return; 
            const isLandscape = window.innerWidth > window.innerHeight;
            if (isLandscape) {
                viewIntro.style.display = 'none';
                viewRotate.style.display = 'none';
                viewMap.style.display = 'flex';
                floatingMenu.style.display = 'flex'; 
            } else {
                viewIntro.style.display = 'none';
                viewMap.style.display = 'none';
                viewRotate.style.display = 'flex';
                floatingMenu.style.display = 'none'; 
            }
        }

        viewIntro.addEventListener('click', () => {
            hasStarted = true;
            checkOrientation(); 
        });

        const introVideo = document.getElementById('intro-video');
        if (introVideo) {
            introVideo.addEventListener('ended', () => {
                hasStarted = true;
                checkOrientation();
            });
            document.addEventListener("WeixinJSBridgeReady", function() {
                introVideo.play().catch(() => {});
            }, false);
        }

        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', () => { setTimeout(checkOrientation, 200); });
        viewIntro.style.display = 'flex';


        // ==========================================
        // 🌟 1. 热区入场须知数据 (保持不变)
        // ==========================================
        const commonFooterHtml = `
            <div>
                <h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">天气与活动调整</h4>
                <ul class="list-disc pl-4 space-y-1 text-gray-700">
                    <li>遇大风、降雨（含小雨）、雷电等恶劣天气，活动将暂停开放，请以现场公告及官方渠道通知为准。</li>
                    <li>如遇不可抗力或活动临时调整，主办方将及时通过官方平台发布信息。</li>
                </ul>
            </div>
            <div>
                <h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">其他说明</h4>
                <p class="text-gray-700">活动期间请遵守现场秩序，听从工作人员管理。入场参加活动即视为您已仔细阅读、充分理解并同意遵守本活动的全部规则及免责条款。主办方在法律允许范围内保留对活动规则及须知的最终解释权。感谢您的理解与配合，祝您游玩愉快。</p>
            </div>
        `;

        // (此处省略了之前写好的长篇HTML规则变量，为了代码不冗长，逻辑均保留并复用)
        const climbingRulesHtml = `<div class="bg-orange-100/80 p-3 rounded-xl text-orange-900 border border-orange-200/60"><strong>【重要提示】</strong> 为确保活动安全有序进行，保障每一位参与者的人身安全与良好体验，请您在入场前仔细阅读本须知。入场即视为您已充分理解并自愿接受以下全部条款。</div><div><h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">1. 开放时间</h4><p class="text-gray-600">周六周日及节假日：10:00 - 19:00</p></div><div><h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">2. 参与流程</h4><ul class="list-disc pl-4 space-y-1 text-gray-700"><li><strong>现场报名：</strong>有意参与的用户请在现场工作人员处登记报名，按报名顺序依次体验。</li><li><strong>教学安排：</strong>品牌方邀请专业攀岩教练在场提供基础教学与帮助，每次教学时长不超过15分钟。</li><li><strong>体验时长：</strong>每人每次体验（含教学）不超过15分钟，结束后如需再次参与，请重新报名排队。</li></ul></div><div><h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">3. 入场条件与限制声明</h4><p class="font-bold text-red-600 mb-2">参与者须确认自身健康状况适宜攀岩运动，隐瞒病史执意参与者，一切后果自负。</p><ol class="list-decimal pl-4 space-y-1 text-gray-700"><li>仅限身高1.2米(含)以上的游客进入，每位儿童须由至少一名成人全程陪同。</li><li>强制签署协议：入场前须现场签署《攀岩墙免责协议》，未签署者一律不得进入。未成年人须由监护人代为签署。</li><li>游客须具备参与本活动的良好身体状况，能够独立行动并遵守安全规则，未成年人须在监护人全程陪同和看管下入场。</li><li>有下列情况禁止入场：患有心脏病、高血压、癫痫、传染病、精神疾病等不适宜剧烈运动的疾病者；存在发烧、感冒、咳喘传染性皮肤病、呕吐、腹泻等不适合参与本活动的身体状况者；醉酒、情绪失控或不服从管理者。孕妇、老人及行动不便者。</li><li>着装要求：(1) 须穿着适合运动的服装及鞋履（建议攀岩鞋或运动鞋） (2) 禁止穿着拖鞋、高跟鞋、裙装等不适合运动的装束。</li></ol></div><div><h4 class="font-black text-orange-700 text-sm sm:text-base mb-1">4. 风险告知与责任豁免</h4><ol class="list-decimal pl-4 space-y-2 text-gray-700"><li><strong>设施性质说明：</strong>攀岩墙为徐汇滨江公共设施，品牌方仅在此组织体验活动，不参与设施的建设、维护与管理。参与者须充分知悉并自愿承担使用公共设施可能产生的风险。</li><li><strong>运动风险告知：</strong>攀岩运动属于【高风险体育运动】，可能存在以下危险：(1) 跌落、滑坠导致的骨折、扭伤、擦伤 (2) 碰撞导致的软组织损伤或脑震荡 (3) 绳索、装备使用不当导致的意外伤害 (4) 因体力不支、技术失误导致的突发状况</li><li><strong>教练服务范围：</strong>(1) 现场教练仅提供【基础技术指导与安全提示】 (2) 不提供一对一全程保护服务 (3) 参与者须在指导下【自主完成攀爬】，并全程对自身安全负责</li><li><strong>参与者义务：</strong>(1) 严格遵守教练及工作人员的安全指引 (2) 未经允许不得擅自攀爬、越线或进行危险动作 (3) 发现身体不适或装备异常须立即停止活动并报告</li><li><strong>责任豁免条款：</strong>凡因以下情形导致的任何人身伤害或财产损失，品牌方不承担任何法律责任：(1) 参与者隐瞒健康状况、年龄不符或监护人未陪同（未成年人） (2) 参与者未遵守安全指引、擅自行动或操作不当 (3) 参与者未正确使用安全装备或拒绝接受教练指导 (4) 公共设施本身存在的设计缺陷或维护问题 (5) 不可抗力因素</li></ol></div>${commonFooterHtml}`;

                    <div class="p-6 sm:p-10 flex flex-col justify-center h-full fade-in bg-[#FDF2E2]">
                        <h2 class="text-2xl sm:text-3xl font-black text-orange-600 mb-8 text-center border-b border-orange-200 pb-4">开放时间与地点</h2>
                        
                        <div class="space-y-8">
                            <div class="flex items-start">
                                <div class="bg-orange-100 w-12 h-12 rounded-full flex justify-center items-center text-2xl shrink-0 shadow-sm">🕒</div>
                                <div class="ml-4">
                                    <p class="font-black text-lg sm:text-xl text-orange-900 tracking-wide mb-1">2026.04.25 — 05.17</p>
                                    <p class="text-xs sm:text-sm font-bold text-orange-600">工作日: 10:00 - 20:00</p>
                                    <p class="text-xs sm:text-sm font-bold text-orange-600">周末/节假日: 10:00 - 21:00</p>
                                </div>
                            </div>

                            <div class="flex items-start">
                                <div class="bg-orange-100 w-12 h-12 rounded-full flex justify-center items-center text-2xl shrink-0 shadow-sm">📍</div>
                                <div class="ml-4">
                                    <p class="font-black text-base sm:text-lg text-orange-900 leading-snug mb-1">上海徐汇滨江塔吊南广场<br>及攀岩墙周边区域</p>
                                    <p class="text-xs sm:text-sm font-bold text-orange-600/80 bg-orange-100/50 inline-block px-2 py-1 rounded">地图搜索：上海徐汇滨江攀岩墙</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-12 opacity-50 flex justify-center">
                            <svg class="w-24 h-6 text-orange-400" viewBox="0 0 100 20" fill="currentColor"><path d="M50 10c-5.5 0-10 4.5-10 10h20c0-5.5-4.5-10-10-10zm-30 0c-5.5 0-10 4.5-10 10h20c0-5.5-4.5-10-10-10zm60 0c-5.5 0-10 4.5-10 10h20c0-5.5-4.5-10-10-10z"/></svg>
                        </div>
                    </div>
                `
            }
        };

        const modalCard = document.getElementById('modal-card');
        const modalDynamicContent = document.getElementById('modal-dynamic-content');
        const modal = document.getElementById('info-modal');
        const modalOverlay = document.getElementById('modal-overlay');

        // 🌟 绑定右下角悬浮按钮的纯前端排版页面
        document.querySelectorAll('.float-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation(); // 阻止地图拖拽
                const floatKey = btn.getAttribute('data-float');
                const data = floatData[floatKey];
                
                if (data) {
                    document.getElementById('modal-glow').style.setProperty('--theme-color', data.themeColor);
                    modalDynamicContent.innerHTML = data.content;
                    
                    modalCard.classList.remove('modal-enter');
                    void modalCard.offsetWidth; 
                    modalCard.classList.add('modal-enter');
                    modal.classList.remove('hidden');
                }
            });
        });

        // ==========================================
        // 🌟 3. 各种弹窗的渲染逻辑 (与之前保持一致)
        // ==========================================
        function renderStandardModal(data) {
            document.getElementById('modal-glow').style.setProperty('--theme-color', data.themeColor);
            const rulesHtml = data.rules.map(rule => `
                <div class="flex items-start">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5 mr-2 flex-shrink-0 mt-0.5" style="color: ${data.themeColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                    <span class="text-xs sm:text-sm text-gray-700 leading-relaxed">${rule}</span>
                </div>
            `).join('');

            const noticeHtml = data.notice ? `<div class="mt-6 text-[10px] sm:text-xs text-gray-500/80 font-medium">* ${data.notice}</div>` : '';

            modalDynamicContent.innerHTML = `
                <div class="p-6 sm:p-8 overflow-y-auto flex flex-col items-center fade-in">
                    <h2 class="text-2xl sm:text-3xl font-black text-gray-800 tracking-wide mb-3">${data.title}</h2>
                    <div class="inline-block px-4 py-1.5 rounded-full text-xs sm:text-sm font-bold shadow-sm border border-white/60 mb-6" style="background-color: ${data.highlightColor}; color: ${data.highlightText};">
                        ${data.highlight}
                    </div>
                    <div class="w-full space-y-3 bg-white/50 rounded-2xl p-4 sm:p-5 border border-white/50 shadow-inner">
                        ${rulesHtml}
                    </div>
                    ${noticeHtml}
                </div>
            `;
        }

        function renderFlowStep1(data) {
            document.getElementById('modal-glow').style.setProperty('--theme-color', data.themeColor);
            modalDynamicContent.innerHTML = `
                <div class="p-6 sm:p-8 flex flex-col items-center h-full overflow-y-auto custom-scrollbar fade-in">
                    <div class="my-auto w-full flex flex-col items-center">
                        <h2 class="text-3xl sm:text-4xl font-black text-orange-600 tracking-widest mb-6 drop-shadow-sm flex-shrink-0">${data.title}</h2>
                        <div class="text-center space-y-2 mb-10 flex-shrink-0">
                            <p class="text-lg sm:text-xl font-bold text-orange-800 leading-relaxed">${data.highlight}</p>
                            <p class="text-xs sm:text-sm text-orange-600/80 font-medium leading-relaxed">${data.subHighlight}</p>
                        </div>
                        <button id="btn-read-safety" class="w-full flex-shrink-0 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-[0_8px_20px_rgba(249,115,22,0.3)] transform transition active:scale-95 text-sm sm:text-base">
                            📄 阅读入场安全须知
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('btn-read-safety').addEventListener('click', () => {
                renderFlowStep2(data.rulesTitle, data.rulesHtml);
            });
        }

        function renderMultiFlowStep1(data) {
            document.getElementById('modal-glow').style.setProperty('--theme-color', data.themeColor);
            const buttonsHtml = data.options.map((opt, index) => `
                <button onclick="window.triggerMultiOption('${data.id}', ${index})" class="w-full flex-shrink-0 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-[0_8px_20px_rgba(249,115,22,0.3)] transform transition active:scale-95 text-sm sm:text-base mb-3.5">
                    ${opt.btnText}
                </button>
            `).join('');

            modalDynamicContent.innerHTML = `
                <div class="p-6 sm:p-8 flex flex-col items-center h-full overflow-y-auto custom-scrollbar fade-in">
                    <div class="my-auto w-full flex flex-col items-center">
                        <h2 class="text-3xl sm:text-4xl font-black text-orange-600 tracking-widest mb-6 drop-shadow-sm flex-shrink-0">${data.title}</h2>
                        <div class="text-center space-y-2 mb-8 flex-shrink-0">
                            <p class="text-lg sm:text-xl font-bold text-orange-800 leading-relaxed">${data.highlight}</p>
                            <p class="text-xs sm:text-sm text-orange-600/80 font-medium leading-relaxed">${data.subHighlight}</p>
                        </div>
                        <div class="w-full flex-shrink-0">
                            ${buttonsHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        window.triggerMultiOption = (zoneId, optionIndex) => {
            const opt = zonesData[zoneId].options[optionIndex];
            renderFlowStep2(opt.rulesTitle, opt.rulesHtml);
        };

        function renderFlowStep2(rulesTitle, rulesHtml) {
            modalDynamicContent.innerHTML = `
                <div class="flex flex-col h-full fade-in max-h-[85dvh]">
                    <div class="pt-6 pb-3 px-6 text-center border-b border-orange-200/50 flex-shrink-0">
                        <h3 class="text-lg sm:text-xl font-black text-orange-800 leading-snug">${rulesTitle}</h3>
                    </div>
                    <div class="p-5 sm:p-6 overflow-y-auto custom-scrollbar flex-1 text-xs sm:text-sm text-gray-800 leading-relaxed space-y-5 bg-orange-50/50">
                        ${rulesHtml}
                    </div>
                    <div class="p-4 bg-white/80 backdrop-blur-md border-t border-gray-100 flex-shrink-0 rounded-b-[32px]">
                        <button id="btn-accept-rules" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transform transition active:scale-95 text-sm sm:text-base flex justify-center items-center">
                            我已阅读并接受此须知，为自己安全负责
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('btn-accept-rules').addEventListener('click', renderPassStep3);
        }

        function renderPassStep3() {
            document.getElementById('modal-glow').style.setProperty('--theme-color', '#10B981');
            const now = new Date();
            const timeString = `${now.getMonth()+1}月${now.getDate()}日 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            modalDynamicContent.innerHTML = `
                <div class="p-8 flex flex-col items-center justify-center min-h-[45vh] fade-in">
                    <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full border-4 flex items-center justify-center mb-6 animate-scan bg-green-50">
                        <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="text-2xl sm:text-3xl font-black text-green-600 mb-2">安全须知已确认</h2>
                    <p class="text-sm font-bold text-gray-500 tracking-widest mb-6 border-b border-gray-200 pb-2">TIME: ${timeString}</p>
                    <div class="bg-green-50 text-green-800 px-6 py-4 rounded-2xl text-center w-full border border-green-200 shadow-inner">
                        <p class="font-bold text-base sm:text-lg">请向现场工作人员出示此界面</p>
                        <p class="text-xs sm:text-sm mt-1 opacity-80">凭此界面方可入场体验</p>
                    </div>
                </div>
            `;
        }

        const hotspots = document.querySelectorAll('.hotspot-ip');
        hotspots.forEach(hotspot => {
            hotspot.addEventListener('click', () => {
                const zoneId = hotspot.getAttribute('data-zone');
                const data = zonesData[zoneId];
                
                if (data) {
                    if (data.type === 'flow') {
                        renderFlowStep1(data); 
                    } else if (data.type === 'multi-flow') {
                        renderMultiFlowStep1(data); 
                    } else {
                        renderStandardModal(data); 
                    }

                    modalCard.classList.remove('modal-enter');
                    void modalCard.offsetWidth; 
                    modalCard.classList.add('modal-enter');
                    modal.classList.remove('hidden');
                }
            });
        });

        // 统一的关闭弹窗事件
        const closeModal = () => modal.classList.add('hidden');
        modalOverlay.addEventListener('click', closeModal);
    </script>
</body>
</html>
